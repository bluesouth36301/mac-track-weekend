
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAC TRACK Mobile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    input, select, button { font-size: 16px; }
  </style>
</head>
<body class="bg-gray-100 text-gray-900">
  <div id="app"></div>

  <script>
    const STORAGE_KEYS = {
      foods: "mac-track-mobile-foods",
      mealsByDate: "mac-track-mobile-meals-by-date",
      profile: "mac-track-mobile-profile",
      currentDate: "mac-track-mobile-current-date"
    };

    const defaultFoods = [
      { name: "93/7 Ground Turkey (cooked, 8 oz)", protein: 48, carbs: 0, fat: 16, calories: 344 },
      { name: "Large Egg (1)", protein: 6, carbs: 1, fat: 5, calories: 70 },
      { name: "Whole Milk (1 cup)", protein: 8, carbs: 12, fat: 8, calories: 150 },
      { name: "Banana (medium)", protein: 1, carbs: 27, fat: 0, calories: 105 },
      { name: "Nature's Own White Wheat Bread (1 slice)", protein: 3, carbs: 13, fat: 1, calories: 70 },
      { name: "OWYN 32g Protein Shake (1 bottle)", protein: 32, carbs: 0, fat: 7, calories: 200 },
      { name: "Members Mark Chocolate Chip Cookie (1)", protein: 2, carbs: 30, fat: 11, calories: 220 },
      { name: "Papa John's Philly Cheesesteak Pizza (1 slice)", protein: 14, carbs: 35, fat: 14, calories: 310 },
      { name: "Papa John's Tuscan 6 Cheese Cheesestick (1 piece)", protein: 4, carbs: 12, fat: 5, calories: 110 },
      { name: "Dr Pepper (12 oz)", protein: 0, carbs: 40, fat: 0, calories: 150 },
      { name: "Keto Burrito Tortilla (large)", protein: 6, carbs: 18, fat: 3, calories: 80 },
      { name: "Flour Tortilla (Burrito Size)", protein: 8, carbs: 50, fat: 9, calories: 300 }
    ];

    function getTodayString() {
      const now = new Date();
      const offset = now.getTimezoneOffset() * 60000;
      return new Date(now.getTime() - offset).toISOString().slice(0, 10);
    }

    function loadJSON(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function saveJSON(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function normalizeName(name) {
      return String(name || "").trim().toLowerCase();
    }

    function calculateCaloriesOut(steps, weight, height, age, sex) {
      const stepCount = Number(steps) || 0;
      if (!stepCount || !weight || !height || !age) return 0;

      const strideLengthInches = sex === "male" ? height * 0.415 : height * 0.413;
      const distanceMiles = (stepCount * strideLengthInches) / 63360;
      const speedMph = 3;
      const hoursWalked = distanceMiles / speedMph;

      let met = 3.3;
      if (speedMph >= 3.5) met = 4.3;
      if (speedMph >= 4) met = 5;

      const weightKg = weight * 0.453592;
      const grossCalories = met * weightKg * hoursWalked;
      const ageAdjustment = age >= 60 ? 0.97 : age <= 25 ? 1.02 : 1;

      return Math.round(grossCalories * ageAdjustment);
    }

    function createId() {
      return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    let state = {
      date: localStorage.getItem(STORAGE_KEYS.currentDate) || getTodayString(),
      foods: loadJSON(STORAGE_KEYS.foods, defaultFoods),
      mealsByDate: loadJSON(STORAGE_KEYS.mealsByDate, {}),
      profile: loadJSON(STORAGE_KEYS.profile, {
        steps: 0,
        age: 35,
        weight: 180,
        height: 70,
        sex: "male",
        maintenanceCalories: 2600
      }),
      search: "",
      selectedFoodName: "",
      servingAmount: 1,
      manual: { name: "", calories: "", protein: "", carbs: "", fat: "" },
      editingFoodName: ""
    };

    state.selectedFoodName = state.foods[0] ? state.foods[0].name : "";

    function persist() {
      localStorage.setItem(STORAGE_KEYS.currentDate, state.date);
      saveJSON(STORAGE_KEYS.foods, state.foods);
      saveJSON(STORAGE_KEYS.mealsByDate, state.mealsByDate);
      saveJSON(STORAGE_KEYS.profile, state.profile);
    }

    function getMealsForDate(date) {
      return Array.isArray(state.mealsByDate[date]) ? state.mealsByDate[date] : [];
    }

    function setMealsForDate(date, meals) {
      state.mealsByDate[date] = meals;
      persist();
      render();
    }

    function totalsForDate(date) {
      return getMealsForDate(date).reduce((acc, meal) => {
        acc.calories += Number(meal.calories || 0);
        acc.protein += Number(meal.protein || 0);
        acc.carbs += Number(meal.carbs || 0);
        acc.fat += Number(meal.fat || 0);
        return acc;
      }, { calories: 0, protein: 0, carbs: 0, fat: 0 });
    }

    function filteredFoods() {
      const q = normalizeName(state.search);
      if (!q) return state.foods;
      return state.foods.filter(f => normalizeName(f.name).includes(q));
    }

    function addFoodToDay(food, servings) {
      const amount = Number(servings) || 1;
      const meal = {
        id: createId(),
        name: amount !== 1 ? food.name + " x " + amount : food.name,
        calories: Number((Number(food.calories || 0) * amount).toFixed(2)),
        protein: Number((Number(food.protein || 0) * amount).toFixed(2)),
        carbs: Number((Number(food.carbs || 0) * amount).toFixed(2)),
        fat: Number((Number(food.fat || 0) * amount).toFixed(2))
      };
      const meals = getMealsForDate(state.date);
      setMealsForDate(state.date, meals.concat([meal]));
    }

    function upsertFood(food) {
      const key = normalizeName(food.name);
      const existingIndex = state.foods.findIndex(f => normalizeName(f.name) === key);
      if (existingIndex >= 0) {
        state.foods[existingIndex] = food;
      } else {
        state.foods.unshift(food);
      }
      persist();
    }

    function saveManual(addToDay) {
      const name = state.manual.name.trim();
      if (!name) return;

      const entry = {
        name: name,
        calories: Number(state.manual.calories || 0),
        protein: Number(state.manual.protein || 0),
        carbs: Number(state.manual.carbs || 0),
        fat: Number(state.manual.fat || 0)
      };

      if (state.editingFoodName) {
        const editKey = normalizeName(state.editingFoodName);
        state.foods = state.foods.map(f => normalizeName(f.name) === editKey ? entry : f);
        state.editingFoodName = "";
        persist();
      } else {
        upsertFood(entry);
      }

      if (addToDay) addFoodToDay(entry, 1);

      state.manual = { name: "", calories: "", protein: "", carbs: "", fat: "" };
      state.selectedFoodName = entry.name;
      persist();
      render();
    }

    function loadFoodToManual(name) {
      const found = state.foods.find(f => f.name === name);
      if (!found) return;
      state.manual = {
        name: found.name,
        calories: String(found.calories ?? ""),
        protein: String(found.protein ?? ""),
        carbs: String(found.carbs ?? ""),
        fat: String(found.fat ?? "")
      };
      state.editingFoodName = found.name;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteFood(name) {
      const key = normalizeName(name);
      state.foods = state.foods.filter(f => normalizeName(f.name) !== key);
      if (normalizeName(state.selectedFoodName) === key) {
        state.selectedFoodName = state.foods[0] ? state.foods[0].name : "";
      }
      if (normalizeName(state.editingFoodName) === key) {
        state.editingFoodName = "";
        state.manual = { name: "", calories: "", protein: "", carbs: "", fat: "" };
      }
      persist();
      render();
    }

    function removeMeal(id) {
      const meals = getMealsForDate(state.date).filter(m => m.id !== id);
      setMealsForDate(state.date, meals);
    }

    function saveAllToCommonFoods() {
      const existing = new Set(state.foods.map(f => normalizeName(f.name)));
      const added = [];
      for (const meal of getMealsForDate(state.date)) {
        const key = normalizeName(meal.name);
        if (!existing.has(key)) {
          existing.add(key);
          added.push({
            name: meal.name,
            calories: Number(meal.calories || 0),
            protein: Number(meal.protein || 0),
            carbs: Number(meal.carbs || 0),
            fat: Number(meal.fat || 0)
          });
        }
      }
      if (added.length) {
        state.foods = added.concat(state.foods);
        persist();
        render();
      }
    }

    function statCard(label, value, subtext) {
      return `
        <div class="rounded-2xl bg-white p-4 shadow">
          <div class="text-xs uppercase tracking-wide text-gray-500">${label}</div>
          <div class="mt-1 text-2xl font-bold">${value}</div>
          <div class="text-sm text-gray-500">${subtext}</div>
        </div>
      `;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function render() {
      const meals = getMealsForDate(state.date);
      const totals = totalsForDate(state.date);
      const caloriesOut = calculateCaloriesOut(
        state.profile.steps,
        state.profile.weight,
        state.profile.height,
        state.profile.age,
        state.profile.sex
      );
      const netCalories = totals.calories - caloriesOut;
      const effectiveMaintenance = Number(state.profile.maintenanceCalories || 0) + caloriesOut;
      const deficit = effectiveMaintenance - totals.calories;

      let status = "";
      if (deficit > 0) {
        status = "In deficit by " + Math.round(deficit);
      } else if (deficit < 0) {
        status = "Above maintenance by " + Math.round(Math.abs(deficit));
      } else {
        status = "At maintenance";
      }

      const filtered = filteredFoods();
      if (!filtered.some(f => f.name === state.selectedFoodName)) {
        state.selectedFoodName = filtered[0] ? filtered[0].name : "";
      }

      const foodOptions = filtered.length
        ? filtered.map(f => `<option value="${escapeHtml(f.name)}"${f.name === state.selectedFoodName ? " selected" : ""}>${escapeHtml(f.name)}</option>`).join("")
        : `<option value="">No matching foods</option>`;

      const mealsMarkup = meals.length
        ? meals.map(m => `
            <div class="flex items-center justify-between gap-3 rounded-2xl border p-3">
              <div>
                <div class="font-semibold">${escapeHtml(m.name)}</div>
                <div class="text-sm text-gray-500">${m.calories} cal • P ${m.protein}g • C ${m.carbs}g • F ${m.fat}g</div>
              </div>
              <button data-remove-meal="${m.id}" class="rounded-xl border px-3 py-2 text-sm">Remove</button>
            </div>
          `).join("")
        : `<div class="rounded-2xl bg-gray-50 p-4 text-gray-500">No foods logged yet for this day.</div>`;

      document.getElementById("app").innerHTML = `
        <div class="mx-auto max-w-xl space-y-4 p-3 pb-10">
          <div class="rounded-3xl bg-white p-4 shadow">
            <h1 class="text-2xl font-bold">MAC TRACK</h1>
            <p class="mt-1 text-sm text-gray-600">Weekend-safe mobile version</p>
          </div>

          <div class="grid grid-cols-2 gap-3 rounded-3xl bg-white p-4 shadow">
            <div>
              <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-gray-500">Date</label>
              <input id="dateInput" class="w-full rounded-xl border p-3" type="date" value="${state.date}" />
            </div>
            <div>
              <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-gray-500">Steps</label>
              <input id="stepsInput" class="w-full rounded-xl border p-3" type="number" value="${state.profile.steps}" placeholder="Steps" />
            </div>
            <div>
              <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-gray-500">Age</label>
              <input id="ageInput" class="w-full rounded-xl border p-3" type="number" value="${state.profile.age}" />
            </div>
            <div>
              <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-gray-500">Weight (lb)</label>
              <input id="weightInput" class="w-full rounded-xl border p-3" type="number" value="${state.profile.weight}" />
            </div>
            <div>
              <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-gray-500">Height (in)</label>
              <input id="heightInput" class="w-full rounded-xl border p-3" type="number" value="${state.profile.height}" />
            </div>
            <div>
              <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-gray-500">Sex</label>
              <select id="sexInput" class="w-full rounded-xl border p-3">
                <option value="male" ${state.profile.sex === "male" ? "selected" : ""}>Male</option>
                <option value="female" ${state.profile.sex === "female" ? "selected" : ""}>Female</option>
              </select>
            </div>
            <div class="col-span-2">
              <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-gray-500">Maintenance Calories</label>
              <input id="maintenanceInput" class="w-full rounded-xl border p-3" type="number" value="${state.profile.maintenanceCalories}" />
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            ${statCard("Calories In", Math.round(totals.calories), "Food logged today")}
            ${statCard("Calories Out", Math.round(caloriesOut), "From steps")}
            ${statCard("Net Calories", Math.round(netCalories), "Calories in minus step burn")}
            ${statCard("Status", status, (deficit > 0 ? "-" : "+") + Math.round(Math.abs(deficit)) + " calories")}
          </div>

          <div class="rounded-3xl bg-white p-4 shadow">
            <h2 class="text-lg font-bold">Search Common Foods</h2>
            <p class="mt-1 text-sm text-gray-500">Pick a food, set servings, add it fast.</p>
            <div class="mt-3 space-y-3">
              <input id="searchInput" class="w-full rounded-xl border p-3" type="text" placeholder="Type to search foods..." value="${escapeHtml(state.search)}" />
              <div class="grid grid-cols-[90px_1fr] gap-3">
                <input id="servingInput" class="rounded-xl border p-3" type="number" min="0.25" step="0.25" value="${state.servingAmount}" />
                <select id="foodSelect" class="rounded-xl border p-3">${foodOptions}</select>
              </div>
              <div class="flex flex-wrap gap-2">
                <button id="addSelectedBtn" class="rounded-2xl bg-black px-4 py-3 text-white">Add</button>
                <button id="editSelectedBtn" class="rounded-2xl border px-4 py-3">Edit</button>
                <button id="deleteSelectedBtn" class="rounded-2xl border border-red-300 px-4 py-3 text-red-700">Delete</button>
              </div>
            </div>
          </div>

          <div class="rounded-3xl bg-white p-4 shadow">
            <h2 class="text-lg font-bold">Manual Entry</h2>
            <p class="mt-1 text-sm text-gray-500">Add a one-off food or save it for later.</p>
            ${state.editingFoodName ? `<div class="mt-2 text-xs font-semibold text-gray-500">Editing: ${escapeHtml(state.editingFoodName)}</div>` : ""}
            <div class="mt-3 grid grid-cols-2 gap-3">
              <input id="manualName" class="rounded-xl border p-3 col-span-2" type="text" placeholder="Food Name" value="${escapeHtml(state.manual.name)}" />
              <input id="manualCalories" class="rounded-xl border p-3" type="number" placeholder="Calories" value="${escapeHtml(state.manual.calories)}" />
              <input id="manualProtein" class="rounded-xl border p-3" type="number" placeholder="Protein" value="${escapeHtml(state.manual.protein)}" />
              <input id="manualCarbs" class="rounded-xl border p-3" type="number" placeholder="Carbs" value="${escapeHtml(state.manual.carbs)}" />
              <input id="manualFat" class="rounded-xl border p-3" type="number" placeholder="Fat" value="${escapeHtml(state.manual.fat)}" />
            </div>
            <div class="mt-3 flex flex-wrap gap-2">
              ${state.editingFoodName
                ? `<button id="updateFoodBtn" class="rounded-2xl bg-black px-4 py-3 text-white">Update Food</button>`
                : `
                  <button id="addDayOnlyBtn" class="rounded-2xl border px-4 py-3">Add to Day Only</button>
                  <button id="saveFoodAddBtn" class="rounded-2xl bg-black px-4 py-3 text-white">Save Food + Add</button>
                `
              }
            </div>
            ${!state.editingFoodName ? `<div class="mt-2 text-xs text-gray-500">“Add to Day Only” logs it just for today. “Save Food + Add” also saves it to Common Foods for later.</div>` : ""}
          </div>

          <div class="rounded-3xl bg-white p-4 shadow">
            <div class="mb-3 flex items-center justify-between gap-3">
              <h2 class="text-lg font-bold">Daily Tracker</h2>
              <button id="saveAllFoodsBtn" class="rounded-2xl bg-black px-4 py-2 text-white text-sm">Save All to Common Foods</button>
            </div>
            <div class="space-y-2">
              ${mealsMarkup}
            </div>
          </div>
        </div>
      `;

      bindEvents();
    }

    function bindEvents() {
      const q = (id) => document.getElementById(id);

      q("dateInput").addEventListener("change", (e) => {
        state.date = e.target.value;
        localStorage.setItem(STORAGE_KEYS.currentDate, state.date);
        render();
      });

      q("stepsInput").addEventListener("input", (e) => {
        state.profile.steps = Number(e.target.value) || 0;
        persist();
        render();
      });

      q("ageInput").addEventListener("input", (e) => {
        state.profile.age = Number(e.target.value) || 0;
        persist();
        render();
      });

      q("weightInput").addEventListener("input", (e) => {
        state.profile.weight = Number(e.target.value) || 0;
        persist();
        render();
      });

      q("heightInput").addEventListener("input", (e) => {
        state.profile.height = Number(e.target.value) || 0;
        persist();
        render();
      });

      q("sexInput").addEventListener("change", (e) => {
        state.profile.sex = e.target.value;
        persist();
        render();
      });

      q("maintenanceInput").addEventListener("input", (e) => {
        state.profile.maintenanceCalories = Number(e.target.value) || 0;
        persist();
        render();
      });

      q("searchInput").addEventListener("input", (e) => {
        state.search = e.target.value;
        render();
      });

      q("servingInput").addEventListener("input", (e) => {
        state.servingAmount = Number(e.target.value) || 1;
        persist();
      });

      q("foodSelect").addEventListener("change", (e) => {
        state.selectedFoodName = e.target.value;
        persist();
      });

      q("addSelectedBtn").addEventListener("click", () => {
        const found = state.foods.find(f => f.name === state.selectedFoodName);
        if (found) addFoodToDay(found, state.servingAmount);
      });

      q("editSelectedBtn").addEventListener("click", () => {
        if (state.selectedFoodName) loadFoodToManual(state.selectedFoodName);
      });

      q("deleteSelectedBtn").addEventListener("click", () => {
        if (!state.selectedFoodName) return;
        if (confirm('Delete "' + state.selectedFoodName + '" from Common Foods?')) {
          deleteFood(state.selectedFoodName);
        }
      });

      q("manualName").addEventListener("input", (e) => { state.manual.name = e.target.value; });
      q("manualCalories").addEventListener("input", (e) => { state.manual.calories = e.target.value; });
      q("manualProtein").addEventListener("input", (e) => { state.manual.protein = e.target.value; });
      q("manualCarbs").addEventListener("input", (e) => { state.manual.carbs = e.target.value; });
      q("manualFat").addEventListener("input", (e) => { state.manual.fat = e.target.value; });

      const updateBtn = q("updateFoodBtn");
      if (updateBtn) updateBtn.addEventListener("click", () => saveManual(false));

      const addDayOnlyBtn = q("addDayOnlyBtn");
      if (addDayOnlyBtn) {
        addDayOnlyBtn.addEventListener("click", () => {
          const name = state.manual.name.trim();
          if (!name) return;
          const entry = {
            name: name,
            calories: Number(state.manual.calories || 0),
            protein: Number(state.manual.protein || 0),
            carbs: Number(state.manual.carbs || 0),
            fat: Number(state.manual.fat || 0)
          };
          addFoodToDay(entry, 1);
          state.manual = { name: "", calories: "", protein: "", carbs: "", fat: "" };
          render();
        });
      }

      const saveFoodAddBtn = q("saveFoodAddBtn");
      if (saveFoodAddBtn) saveFoodAddBtn.addEventListener("click", () => saveManual(true));

      q("saveAllFoodsBtn").addEventListener("click", saveAllToCommonFoods);

      document.querySelectorAll("[data-remove-meal]").forEach(btn => {
        btn.addEventListener("click", () => removeMeal(btn.getAttribute("data-remove-meal")));
      });
    }

    persist();
    render();
  </script>
</body>
</html>
